<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資產 AI 查詢系統</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft JhengHei',Arial,sans-serif;background:#f0f4f8;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:linear-gradient(135deg,#1e3a8a,#2563eb);padding:13px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr h1{color:#fff;font-size:18px;font-weight:700}
.hdr p{color:rgba(255,255,255,.65);font-size:11px;margin-top:2px}
.badge{margin-left:auto;background:rgba(255,255,255,.18);color:#fff;border-radius:20px;padding:3px 11px;font-size:12px;font-weight:600}
.tabs{display:flex;background:#1e3a8a;flex-shrink:0}
.tab{flex:1;padding:10px;text-align:center;color:rgba(255,255,255,.6);cursor:pointer;font-size:13px;font-weight:600;border:none;background:none;font-family:inherit;border-bottom:3px solid transparent}
.tab.on{color:#fff;border-bottom-color:#60a5fa}
.panel{display:none;flex:1;flex-direction:column;min-height:0}
.panel.on{display:flex}
.chips{background:#fff;border-bottom:1px solid #e5e7eb;padding:8px 12px;display:flex;gap:7px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;border-radius:20px;padding:5px 12px;font-size:12px;white-space:nowrap;cursor:pointer;font-family:inherit;flex-shrink:0}
.chip:hover{background:#1d4ed8;color:#fff}
.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.bub{max-width:88%;border-radius:14px;padding:10px 14px;font-size:14px;line-height:1.6;word-break:break-word}
.bub.user{align-self:flex-end;background:#1d4ed8;color:#fff;border-bottom-right-radius:3px}
.bub.ai{align-self:flex-start;background:#fff;color:#111;border-bottom-left-radius:3px;box-shadow:0 1px 4px rgba(0,0,0,.09);white-space:pre-wrap}
.bub.ai.typing{color:#9ca3af;font-style:italic}
.bub.sys{align-self:center;background:#f0fdf4;color:#166534;border-radius:10px;font-size:12px;text-align:center;max-width:100%;padding:8px 16px}
.inp-wrap{background:#fff;border-top:1px solid #e5e7eb;padding:10px 12px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.inp{flex:1;border:2px solid #e5e7eb;border-radius:22px;padding:9px 16px;font-size:14px;font-family:inherit;outline:none;resize:none;max-height:90px}
.inp:focus{border-color:#2563eb}
.sbtn{background:#2563eb;color:#fff;border:none;border-radius:50%;width:42px;height:42px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sbtn:hover{background:#1e3a8a}
.sbtn:disabled{background:#9ca3af;cursor:not-allowed}
.sbox{background:#fff;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.08);flex-shrink:0}
.srow{display:flex;gap:8px;margin-bottom:9px}
.sinp{flex:1;border:2px solid #2563eb;border-radius:10px;padding:10px 14px;font-size:15px;font-family:inherit;outline:none}
.cbtn{background:#e5e7eb;border:none;border-radius:10px;padding:10px 13px;cursor:pointer;font-size:13px;font-family:inherit}
.frow{display:flex;gap:8px}
.fsel{border:1px solid #d1d5db;border-radius:8px;padding:6px 9px;font-size:12px;font-family:inherit;flex:1}
.sbar{background:#eff6ff;padding:7px 16px;font-size:12px;color:#1e40af;font-weight:600;flex-shrink:0}
.slist{padding:12px 14px;overflow-y:auto;flex:1}
.card{background:#fff;border-radius:10px;padding:13px 14px;margin-bottom:9px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:4px solid #2563eb}
.ctop{display:flex;align-items:flex-start;gap:9px}
.cid{background:#2563eb;color:#fff;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;white-space:nowrap;font-family:monospace;flex-shrink:0}
.cname{font-size:15px;font-weight:700;color:#111}
.cmeta{margin-top:6px;display:grid;grid-template-columns:1fr 1fr;gap:4px 14px}
.cf{font-size:11px;color:#6b7280}
.cf span{color:#222;font-weight:600}
.ltag{display:inline-block;margin-top:6px;background:#dcfce7;color:#166534;border-radius:5px;padding:2px 9px;font-size:12px;font-weight:700}
.ltag.none{background:#fef3c7;color:#92400e}
.spec{font-size:11px;color:#9ca3af;margin-top:3px}
.empty{text-align:center;padding:50px 20px;color:#9ca3af;font-size:14px}
.hint{text-align:center;padding:40px 20px;color:#6b7280;font-size:13px;line-height:1.9}
mark{background:#fef08a;border-radius:2px}</style>
</head>
<body>
<div class="hdr">
  <div><h1>📦 資產 AI 查詢系統</h1><p>天下數位科技股份有限公司</p></div>
  <div class="badge">3,070 筆資產</div>
</div>
<div class="tabs">
  <button class="tab on" onclick="switchTab('ai',this)">🤖 AI 對話查詢</button>
  <button class="tab" onclick="switchTab('search',this)">🔍 關鍵字搜尋</button>
</div>
<div class="panel on" id="pai">
  <div class="chips">
    <button class="chip" onclick="ask('辦公椅在哪裡？')">辦公椅在哪？</button>
    <button class="chip" onclick="ask('工程部有哪些電腦？')">工程部電腦</button>
    <button class="chip" onclick="ask('廠四有哪些資產？')">廠四資產</button>
    <button class="chip" onclick="ask('所有冷氣機在哪？')">找冷氣機</button>
    <button class="chip" onclick="ask('哪些資產放置地點是空白的？')">未填地點</button>
    <button class="chip" onclick="ask('公務車有幾台？車牌是什麼？')">公務車</button>
    <button class="chip" onclick="ask('管理部共有多少筆資產？')">管理部統計</button>
    <button class="chip" onclick="ask('11樓有哪些監視器？')">11樓監視器</button>
  </div>
  <div class="msgs" id="msgs">
    <div class="bub sys">👋 直接輸入問題，或點上方快速按鈕<br>例：「XB1-0001 在哪裡？」「找氧氣機類似名稱」</div>
  </div>
  <div class="inp-wrap">
    <textarea class="inp" id="inp" placeholder="問我任何資產問題…" rows="1"></textarea>
    <button class="sbtn" id="sbtn">➤</button>
  </div>
</div>
<div class="panel" id="psearch" style="overflow:hidden">
  <div class="sbox">
    <div class="srow">
      <input class="sinp" id="sq" placeholder="🔍 資產編號、名稱、地點、部門…" autocomplete="off">
      <button class="cbtn" id="clrbtn">✕</button>
    </div>
    <div class="frow">
      <select class="fsel" id="sdept"><option value="">全部部門</option></select>
      <select class="fsel" id="sloc"><option value="">全部地點</option></select>
    </div>
  </div>
  <div class="sbar" id="sbar">共 3,070 筆資產</div>
  <div class="slist" id="slist">
    <div class="hint">輸入關鍵字搜尋資產<br>或切換「AI 對話」直接用中文問</div>
  </div>
</div>

function addBub(cls,txt){
  var d=document.createElement('div');
  d.className='bub '+cls;
  d.textContent=txt;
  var m=document.getElementById('msgs');
  m.appendChild(d);
  m.scrollTop=m.scrollHeight;
  return d;
}

function ask(q){ document.getElementById('inp').value=q; doSend(); }

function filterAssets(q){
  var lower=q.toLowerCase().replace(/[？?！!。，,、：:]/g,'');
  var kw=lower.split(' ').filter(function(w){return w.length>=2;});
  if(!kw.length) return ASSETS.slice(0,200);
  var scored=[];
  DATA.forEach(function(a){
    var sc=0;
    kw.forEach(function(w){
      if(a.i.toLowerCase()===w) sc+=100;
      else if(a.i.toLowerCase().indexOf(w)>=0) sc+=50;
      if(a.n.toLowerCase().indexOf(w)>=0) sc+=30;
      if(a.l.toLowerCase().indexOf(w)>=0) sc+=25;
      if(a.d.toLowerCase().indexOf(w)>=0) sc+=20;
      if(a.s.toLowerCase().indexOf(w)>=0) sc+=10;
    });
    if(sc>0) scored.push({a:a,sc:sc});
  });
  scored.sort(function(a,b){return b.sc-a.sc;});
  return scored.slice(0,250).map(function(x){return x.a;});
}

async function doSend(){
  var inp=document.getElementById('inp');
  var q=inp.value.trim();
  if(!q) return;
  inp.value=''; inp.style.height='auto';
  document.getElementById('sbtn').disabled=true;
  addBub('user',q);
  var thinking=addBub('ai typing','AI 思考中…');

  var subset=filterAssets(q);
  var ctx=subset.map(function(a){
    return a.i+'|'+a.n+'|'+a.d+'|'+(a.l||'地點未填')+'|'+a.q;
  }).join('\n');

  var prompt='你是天下數位科技股份有限公司資產查詢助理，用繁體中文回答。\n資料格式：編號|名稱|部門|地點|數量\n共'+subset.length+'筆：\n'+ctx+'\n\n規則：問在哪直接說地點；問有哪些列清單（・[編號] 名稱 → 地點）；問數量給數字；名稱不確定時找相似的；找不到說找不到；最多列20筆。\n\n問題：'+q;

  try{
    var res=await fetch('https://api.cloudflare.com/client/v4/accounts/'+CF_ACCOUNT+'/ai/run/@cf/meta/llama-3.1-8b-instruct',{
      method:'POST',
      headers:{
        'Authorization':'Bearer '+CF_TOKEN,
        'Content-Type':'application/json'
      },
      body:JSON.stringify({
        messages:[
          {role:'system',content:'你是天下數位科技股份有限公司資產查詢助理，只用繁體中文回答，簡潔直接。'},
          {role:'user',content:prompt}
        ]
      })
    });
    var d=await res.json();
    if(!res.ok||!d.success){
      throw new Error(d.errors&&d.errors[0]?d.errors[0].message:'API錯誤');
    }
    var ans=d.result&&d.result.response?d.result.response:'（無回應）';
    thinking.textContent=ans;
    thinking.classList.remove('typing');
  }catch(e){
    thinking.textContent='⚠️ 錯誤：'+e.message;
    thinking.classList.remove('typing');
  }
  document.getElementById('sbtn').disabled=false;
}

var st;
function hl(t,q){
  if(!q||!t) return t||'';
  return String(t).replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),function(m){return '<mark>'+m+'</mark>';});
}
function dosearch(){
  var q=document.getElementById('sq').value.trim().toLowerCase();
  var dept=document.getElementById('sdept').value;
  var loc=document.getElementById('sloc').value;
  if(!q&&!dept&&!loc){clr();return;}
  var res=DATA.slice();
  if(q) res=res.filter(function(a){return a._s.indexOf(q)>=0;});
  if(dept) res=res.filter(function(a){return a.d===dept;});
  if(loc) res=res.filter(function(a){return a.l===loc;});
  res.sort(function(a,b){
    var ae=a.i.toLowerCase()===q,be=b.i.toLowerCase()===q;
    if(ae&&!be)return -1;if(be&&!ae)return 1;
    var as2=a.i.toLowerCase().indexOf(q)===0,bs2=b.i.toLowerCase().indexOf(q)===0;
    if(as2&&!bs2)return -1;if(bs2&&!as2)return 1;
    return 0;
  });
  var total=res.length;
  document.getElementById('sbar').textContent=total===0?'找不到':total<=100?'找到 '+total+' 筆':'找到 '+total+' 筆，顯示前 100 筆';
  if(total===0){document.getElementById('slist').innerHTML='<div class="empty">😕 找不到，換個關鍵字試試</div>';return;}
  document.getElementById('slist').innerHTML=res.slice(0,100).map(function(a){
    return '<div class="card"><div class="ctop"><div class="cid">'+hl(a.i,q)+'</div><div class="cname">'+hl(a.n,q)+'</div></div><div class="cmeta"><div class="cf">部門：<span>'+hl(a.d,q)+'</span></div><div class="cf">數量：<span>'+a.q+'</span></div></div>'+(a.s?'<div class="spec">'+hl(a.s,q)+'</div>':'')+'<div><span class="ltag'+(a.l?'':' none')+'">📍 '+hl(a.l||'放置地點未填',q)+'</span></div></div>';
  }).join('');
}
